name = "risksync"
compatibility_date = "2024-01-01"

# KV namespace — create this in Cloudflare dashboard first
# Dashboard → Workers & Pages → KV → Create namespace → name it "RISKSYNC_KV"
# Then paste the namespace ID below
[[kv_namespaces]]
binding = "RISKSYNC_KV"
id = "c017b4f2cfbc4b8382d510b40ff4ec98"

# Cron trigger — runs enrichment every 6 hours
[triggers]
crons = ["0 */6 * * *"]

# Environment variables — set NVD_API_KEY in Cloudflare dashboard
# Dashboard → Workers & Pages → risksync → Settings → Variables
[vars]
CACHE_KEY = "threats_v1"
