<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>RS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
<style>
body{margin:0;padding:16px;background:#080d18;color:#dde4f0;font-family:monospace;font-size:12px}
.ok{color:#0ed27a}.err{color:#f04060}.hi{color:#2d7ef7}
</style>
</head>
<body>
<div id="root">
  <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#080d18;display:flex;align-items:center;justify-content:center;font-family:monospace;flex-direction:column;gap:16px">
    <div style="width:44px;height:44px;border-radius:11px;background:#2d7ef7;display:flex;align-items:center;justify-content:center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v10l9 5 9-5V7L12 2z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/></svg>
    </div>
    <div style="color:#dde4f0;font-size:15px;font-weight:700;letter-spacing:.5px">RiskSync</div>
    <div style="color:#5a6f96;font-size:11px">Loading intelligence platform...</div>
  </div>
</div>

<script>
/* RiskSync loader */
window._rsStatus = function(msg){
  var el = document.getElementById('load-status');
  if(el) el.textContent = msg;
};
window._rsErr = function(msg){
  document.getElementById('root').innerHTML =
    '<div style="color:#f04060;padding:28px;font-family:monospace;font-size:13px;background:#1e0810;border-radius:10px;margin:20px;border:1px solid #f04060">' +
    '<b>RiskSync failed to load:</b><br/><br/>' + msg + '</div>';
};
</script>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

<script type="text/jsxcode" id="c1">
const {useState,useEffect,useCallback,useRef}=React;

function Chip({label,color,bg,small}){
  return <span style={{fontSize:small?9:10,fontWeight:700,padding:small?"1px 5px":"2px 8px",borderRadius:3,background:bg||(color+"22"),color,border:`1px solid ${color}44`,letterSpacing:.3,whiteSpace:"nowrap",display:"inline-block"}}>{label}</span>;
}

function SevChip({score,small}){return <Chip label={sevOf(score)} color={sevColor(score)} bg={sevBg(score)} small={small}/>;}

function Ring({score,size=80}){
  const r=size*.37,cx=size/2,cy=size/2,sw=size*.09;
  const circ=2*Math.PI*r,pct=Math.min(score/10,1),col=sevColor(score);
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={sw}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={col} strokeWidth={sw} strokeLinecap="round"
        strokeDasharray={`${pct*circ} ${circ}`} strokeDashoffset={circ*.25}
        style={{transition:"stroke-dasharray .9s cubic-bezier(.4,0,.2,1)"}}/>
      <text x={cx} y={cy+1} textAnchor="middle" dominantBaseline="middle" fontSize={size*.19} fontWeight="800" fill={col}>{score.toFixed(1)}</text>
    </svg>
  );
}

function Bar({value,max=10,color,height=5}){
  return(
    <div style={{height,background:C.border,borderRadius:3,overflow:"hidden"}}>
      <div style={{width:`${Math.min(100,(value/max)*100)}%`,height:"100%",background:color,borderRadius:3,transition:"width .6s ease"}}/>
    </div>
  );
}

function HeatCell({cat,score}){
  const col=sevColor(score),bg=sevBg(score);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
      <div style={{width:52,height:52,borderRadius:10,background:bg,border:`1.5px solid ${col}55`,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:2}}>
        <span style={{fontSize:12,color:col,fontWeight:800}}>{score.toFixed(1)}</span>
        <div style={{width:28,height:3,background:C.border,borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${Math.min(100,score*10)}%`,height:"100%",background:col,borderRadius:2}}/>
        </div>
      </div>
      <span style={{fontSize:9,color:C.muted,textAlign:"center",lineHeight:1.2,maxWidth:60}}>{cat.short}</span>
    </div>
  );
}

function NavBtn({icon,label,active,onClick}){
  return(
    <button onClick={onClick} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",borderRadius:7,border:"none",background:active?C.accentBg:"transparent",color:active?C.accent:C.muted,cursor:"pointer",width:"100%",textAlign:"left"}}>
      <i className={`ti ${icon}`} style={{fontSize:15,flexShrink:0}}/>
      <span style={{fontSize:12,fontWeight:active?600:400}}>{label}</span>
    </button>
  );
}

/* ── ONBOARDING ── */
</script>
<script type="text/jsxcode" id="c2">
function Onboarding({onComplete}){
  const [step,setStep]=useState(0);
  const [p,setP]=useState({
    industry:null,scale:null,geo:null,subTags:[],
    techPillars:[],
    sources:["cisa","nvd","msrc","misp","otx","sans","epss"]
  });
  const [confMeter,setConfMeter]=useState(40);

  useEffect(()=>{
    const paid=SOURCES.filter(s=>(s.status==="pro"||s.status==="enterprise")&&p.sources.includes(s.id)).length;
    setConfMeter(Math.min(100,40+paid*8+(p.techPillars.length>2?10:0)+(p.subTags.length>0?5:0)));
  },[p.sources,p.techPillars,p.subTags]);

  const toggle=(key,val)=>setP(prev=>({
    ...prev,
    [key]:prev[key].includes(val)?prev[key].filter(x=>x!==val):[...prev[key],val]
  }));

  /* 3 steps: 0=Welcome, 1=Profile (industry+scale+region+stack), 2=Sources */
  const steps=["Welcome","Your Profile","Intelligence Sources"];
  /* Step 1 valid when all 4 core fields are set */
  const canNext=[true, !!(p.industry&&p.scale&&p.geo&&p.techPillars.length>0), true];

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>

      {/* ── Top bar ── */}
      <div style={{padding:"14px 32px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <i className="ti ti-shield-lock" style={{fontSize:15,color:"#fff"}}/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:800,color:C.text}}>RiskSync</div>
            <div style={{fontSize:9,color:C.muted,letterSpacing:.5}}>Micro-GRC · 2026</div>
          </div>
        </div>
        {/* Step dots */}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {steps.map((s,i)=>(
            <React.Fragment key={s}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:i<step?C.green:i===step?C.accent:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:i<=step?"#fff":C.muted,transition:"all .3s"}}>
                  {i<step?"✓":i+1}
                </div>
                <span style={{fontSize:11,color:i===step?C.text:C.muted,fontWeight:i===step?600:400}}>{s}</span>
              </div>
              {i<steps.length-1&&<div style={{width:24,height:1,background:i<step?C.green:C.border}}/>}
            </React.Fragment>
          ))}
        </div>
        <div style={{width:120}}/>
      </div>

      {/* ── Content ── */}
      <div style={{flex:1,overflowY:"auto",padding:"28px 32px 32px"}}>

        {/* ══ STEP 0 — WELCOME ══ */}
        {step===0&&(
          <div className="fadein" style={{maxWidth:640,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
              <div style={{width:60,height:60,borderRadius:14,background:C.accentBg,border:`1px solid ${C.accent}50`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <i className="ti ti-shield-lock" style={{fontSize:28,color:C.accent}}/>
              </div>
              <div>
                <div style={{fontSize:26,fontWeight:900,color:C.text,letterSpacing:-.5}}>RiskSync</div>
                <div style={{fontSize:12,color:C.muted}}>Micro-GRC · Intelligence Platform · 2026</div>
              </div>
            </div>
            <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:8}}>Your threat intelligence, personalised.</div>
            <p style={{fontSize:13,color:C.muted,lineHeight:1.8,marginBottom:24}}>
              We create a <strong style={{color:C.text}}>Digital Twin</strong> of your organisation — a risk profile calibrated to your industry, size, geography, and technology. The result: a live top-10 threat list that reflects your actual exposure, not a generic vulnerability feed.
            </p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
              {[
                {icon:"ti-building",    label:"Industry context",    desc:"14 sectors, each with its own threat profile and attacker interest level"},
                {icon:"ti-users",       label:"Scale calibration",   desc:"From startup to global corp — size changes who targets you and how"},
                {icon:"ti-satellite",   label:"14 intel sources",    desc:"CISA KEV, NIST NVD, EPSS, dark web feeds — synthesised in real time"},
              ].map(f=>(
                <div key={f.label} style={{padding:"16px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:10}}>
                  <i className={`ti ${f.icon}`} style={{fontSize:22,color:C.accent,display:"block",marginBottom:8}}/>
                  <div style={{fontSize:12,fontWeight:600,color:C.text,marginBottom:4}}>{f.label}</div>
                  <div style={{fontSize:11,color:C.muted,lineHeight:1.5}}>{f.desc}</div>
                </div>
              ))}
            </div>
            <div style={{padding:"10px 14px",background:C.card,borderRadius:7,border:`1px solid ${C.border}`,fontSize:11,color:C.muted,marginBottom:28}}>
              🔒 <strong style={{color:C.text}}>Zero-footprint:</strong> no company name, no addresses, no employee data stored. Only classification metadata used for scoring.
            </div>
          </div>
        )}

        {/* ══ STEP 1 — COMBINED PROFILE FORM ══ */}
        {step===1&&(
          <div className="fadein">
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Set your profile</div>
              <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:4}}>Tell us about your organisation</div>
              <div style={{fontSize:12,color:C.muted}}>All four inputs are required. Your selections drive every score and ranking in RiskSync.</div>
            </div>

            {/* Progress bar across 4 fields */}
            <div style={{display:"flex",gap:4,marginBottom:20}}>
              {[
                {label:"Industry",  done:!!p.industry},
                {label:"Scale",     done:!!p.scale},
                {label:"Region",    done:!!p.geo},
                {label:"Tech stack",done:p.techPillars.length>0},
              ].map((f,i)=>(
                <div key={f.label} style={{flex:1}}>
                  <div style={{height:3,borderRadius:2,background:f.done?C.green:C.border,marginBottom:4,transition:"background .3s"}}/>
                  <div style={{fontSize:9,color:f.done?C.green:C.muted,fontWeight:f.done?700:400}}>{f.done?"✓ ":""}{f.label}</div>
                </div>
              ))}
            </div>

            {/* ── 4-section form ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

              {/* INDUSTRY */}
              <div style={{background:C.card,border:`1px solid ${p.industry?C.green+"60":C.border}`,borderRadius:12,padding:"14px 16px",transition:"border .2s"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
                  <i className="ti ti-building" style={{fontSize:14,color:C.accent}}/>
                  <span style={{fontSize:13,fontWeight:700,color:C.text}}>Industry</span>
                  {p.industry&&<span style={{marginLeft:"auto",fontSize:10,color:C.green,fontWeight:700}}>✓ {INDUSTRIES.find(i=>i.id===p.industry)?.label}</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,maxHeight:280,overflowY:"auto"}}>
                  {INDUSTRIES.map(ind=>(
                    <button key={ind.id} onClick={()=>setP(prev=>({...prev,industry:ind.id}))}
                      style={{display:"flex",alignItems:"center",gap:7,padding:"8px 10px",border:`1px solid ${p.industry===ind.id?ind.color:C.border}`,borderRadius:7,background:p.industry===ind.id?ind.color+"18":C.bg,cursor:"pointer",textAlign:"left",transition:"all .12s"}}>
                      <span style={{fontSize:18,flexShrink:0}}>{ind.icon}</span>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:10,fontWeight:600,color:p.industry===ind.id?ind.color:C.text,lineHeight:1.3}}>{ind.label}</div>
                        <div style={{fontSize:9,color:C.dim,marginTop:1}}>{ind.primaryRisk.slice(0,22)}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              {/* SCALE + REGION stacked */}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>

                {/* SCALE */}
                <div style={{background:C.card,border:`1px solid ${p.scale?C.green+"60":C.border}`,borderRadius:12,padding:"14px 16px",flex:1,transition:"border .2s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                    <i className="ti ti-users" style={{fontSize:14,color:C.purple}}/>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>Organisation scale</span>
                    {p.scale&&<span style={{marginLeft:"auto",fontSize:10,color:C.green,fontWeight:700}}>✓ {SCALES.find(s=>s.id===p.scale)?.label}</span>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {SCALES.map(sc=>(
                      <button key={sc.id} onClick={()=>setP(prev=>({...prev,scale:sc.id}))}
                        style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",border:`1px solid ${p.scale===sc.id?C.purple:C.border}`,borderRadius:7,background:p.scale===sc.id?C.purpleBg:C.bg,cursor:"pointer",textAlign:"left",transition:"all .12s"}}>
                        <div>
                          <div style={{fontSize:11,fontWeight:600,color:p.scale===sc.id?C.purple:C.text}}>{sc.label}</div>
                          <div style={{fontSize:10,color:C.muted}}>{sc.range} employees</div>
                        </div>
                        <div style={{fontSize:11,color:sc.s_multiplier>=1.4?C.red:sc.s_multiplier>=1.2?C.amber:C.green,fontWeight:700,flexShrink:0,marginLeft:8}}>
                          {sc.s_multiplier>=1.4?"High risk":"Moderate"}
                        </div>
                      </button>
                    ))}
                  </div>
                </div>

                {/* REGION */}
                <div style={{background:C.card,border:`1px solid ${p.geo?C.green+"60":C.border}`,borderRadius:12,padding:"14px 16px",flex:1,transition:"border .2s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                    <i className="ti ti-map-pin" style={{fontSize:14,color:C.cyan}}/>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>Primary region</span>
                    {p.geo&&<span style={{marginLeft:"auto",fontSize:10,color:C.green,fontWeight:700}}>✓ {GEOS.find(g=>g.id===p.geo)?.label}</span>}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                    {GEOS.map(g=>(
                      <button key={g.id} onClick={()=>setP(prev=>({...prev,geo:g.id}))}
                        style={{padding:"8px 10px",border:`1px solid ${p.geo===g.id?C.cyan:C.border}`,borderRadius:7,background:p.geo===g.id?C.cyanBg:C.bg,cursor:"pointer",textAlign:"left",transition:"all .12s"}}>
                        <div style={{fontSize:11,fontWeight:600,color:p.geo===g.id?C.cyan:C.text,marginBottom:2}}>{g.label}</div>
                        <div style={{fontSize:9,color:C.muted,lineHeight:1.3}}>{g.reg.split("·")[0].trim()}</div>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            {/* TECH STACK — full width below */}
            <div style={{marginTop:14,background:C.card,border:`1px solid ${p.techPillars.length>0?C.green+"60":C.border}`,borderRadius:12,padding:"14px 16px",transition:"border .2s"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <i className="ti ti-server" style={{fontSize:14,color:C.amber}}/>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>Technology stack</span>
                <span style={{fontSize:11,color:C.muted,marginLeft:4}}>— select all that apply</span>
                {p.techPillars.length>0&&<span style={{marginLeft:"auto",fontSize:10,color:C.green,fontWeight:700}}>✓ {p.techPillars.length} selected</span>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:7}}>
                {TECH_PILLARS.map(t=>{
                  const sel=p.techPillars.includes(t.id);
                  return(
                    <button key={t.id} onClick={()=>toggle("techPillars",t.id)}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",border:`1px solid ${sel?C.amber:C.border}`,borderRadius:8,background:sel?C.amberBg:C.bg,cursor:"pointer",textAlign:"left",transition:"all .12s"}}>
                      <span style={{fontSize:18,flexShrink:0}}>{t.icon}</span>
                      <div>
                        <div style={{fontSize:11,fontWeight:sel?600:400,color:sel?C.amber:C.text}}>{t.label}</div>
                        <div style={{fontSize:9,color:C.dim,marginTop:1}}>{t.threatTags.slice(0,2).join(", ")}</div>
                      </div>
                      {sel&&<div style={{marginLeft:"auto",width:14,height:14,borderRadius:3,background:C.amber,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        <i className="ti ti-check" style={{fontSize:9,color:"#000"}}/>
                      </div>}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Sub-tags */}
            <div style={{marginTop:10,padding:"10px 14px",background:C.card,borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:C.muted,marginBottom:7}}>Optional fine-tuning <span style={{color:C.dim}}>(adds scoring precision)</span></div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {SUB_TAGS.map(t=>(
                  <button key={t.id} onClick={()=>toggle("subTags",t.id)}
                    style={{fontSize:10,padding:"4px 11px",borderRadius:20,border:`1px solid ${p.subTags.includes(t.id)?C.accent:C.border}`,background:p.subTags.includes(t.id)?C.accentBg:"transparent",color:p.subTags.includes(t.id)?C.accent:C.muted,cursor:"pointer",transition:"all .12s"}}>
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ══ STEP 2 — INTEL SOURCES ══ */}
        {step===2&&(
          <div className="fadein" style={{maxWidth:760,margin:"0 auto"}}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Intelligence sources</div>
              <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:4}}>Tune your threat feeds</div>
              <div style={{fontSize:12,color:C.muted}}>Core sources (Tier I) are always active. Pro and Enterprise tiers unlock dark web and specialist feeds.</div>
            </div>

            {/* Confidence meter */}
            <div style={{padding:"11px 15px",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:C.muted}}>Data confidence</span>
                <span style={{fontSize:13,fontWeight:700,color:confMeter>=80?C.green:confMeter>=60?C.amber:C.red}}>{confMeter}%</span>
              </div>
              <div style={{height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${confMeter}%`,height:"100%",background:confMeter>=80?C.green:confMeter>=60?C.amber:C.red,borderRadius:3,transition:"width .4s ease"}}/>
              </div>
              {confMeter<70&&<div style={{fontSize:10,color:C.amber,marginTop:6}}>Add Pro sources to reach 80%+ confidence</div>}
            </div>

            {["I","II","III","IV"].map(tier=>{
              const grp=SOURCES.filter(s=>s.tier===tier);
              const tl={"I":"Verified — Government","II":"Community & ML scoring","III":"Dark web & frontline","IV":"AI / Supply chain / Sector"}[tier];
              return(
                <div key={tier} style={{marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:7}}>Tier {tier} — {tl}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                    {grp.map(src=>{
                      const sel=p.sources.includes(src.id);
                      const locked=src.status==="pro"||src.status==="enterprise";
                      return(
                        <button key={src.id} onClick={()=>toggle("sources",src.id)}
                          style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",border:`1px solid ${sel?src.color+"55":C.border}`,borderRadius:8,background:sel?src.color+"10":C.card,cursor:"pointer",textAlign:"left",transition:"all .12s"}}>
                          <div style={{width:26,height:26,borderRadius:6,background:sel?src.color+"30":C.border+"80",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                            <span style={{fontSize:8,fontWeight:800,color:sel?src.color:C.dim}}>{src.name.slice(0,4).toUpperCase()}</span>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:1}}>
                              <span style={{fontSize:11,fontWeight:600,color:C.text}}>{src.name}</span>
                              {locked&&<span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,background:C.amber+"20",color:C.amber,border:`1px solid ${C.amber}30`}}>{src.status.toUpperCase()}</span>}
                            </div>
                            <div style={{fontSize:10,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{src.desc}</div>
                          </div>

        }

        {step>=1&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>

            {p.scale&&<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:C.purple+"20",color:C.purple,border:`1px solid ${C.purple}40`,fontWeight:600}}>{SCALES.find(s=>s.id===p.scale)?.label}</span>}
            {p.geo&&<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:C.cyan+"20",color:C.cyan,border:`1px solid ${C.cyan}40`,fontWeight:600}}>{GEOS.find(g=>g.id===p.geo)?.label}</span>}
            {p.techPillars.length>0&&<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:C.amber+"20",color:C.amber,border:`1px solid ${C.amber}40`,fontWeight:600}}>{p.techPillars.length} platform{p.techPillars.length>1?"s":""}</span>}
          </div>
        )}
        {step===0&&<div/>}

        {step<steps.length-1
          ?<button onClick={()=>setStep(s=>s+1)} disabled={!canNext[step]}
              style={{padding:"10px 24px",borderRadius:8,border:"none",background:canNext[step]?C.accent:C.dim,color:"#fff",fontSize:13,fontWeight:700,cursor:canNext[step]?"pointer":"not-allowed"}}>

          :<button onClick={()=>onComplete(p)}
              style={{padding:"10px 28px",borderRadius:8,border:"none",background:C.green,color:"#000",fontSize:13,fontWeight:800,cursor:"pointer"}}>
              ▶ Launch RiskSync
            </button>
        }
      </div>
    </div>
  );
}

/* ── VULN FUNNEL ── */

function VulnFunnel({profile,liveVulns}){
  const [hovered,setHovered]=useState(null);
  const [tooltipPos,setTooltipPos]=useState({x:0,y:0,side:"right"});
  const containerRef=useRef(null);
  const top10=getTop10Vulns(profile,liveVulns);
  const ind=INDUSTRIES.find(i=>i.id===profile.industry);
  const sc=SCALES.find(s=>s.id===profile.scale);
  const geo=GEOS.find(g=>g.id===profile.geo);

  const sevCol=n=>n>=8?"#f04060":n>=6?"#f5a623":n>=4?"#2d7ef7":"#0ed27a";
  const sevLbl=n=>n>=8?"CRITICAL":n>=6?"HIGH":n>=4?"MEDIUM":"LOW";
  const sevBgCol=n=>n>=8?"#1e0810":n>=6?"#1e1200":n>=4?"#0d1f3c":"#051a10";

  const avgScore=parseFloat((top10.reduce((a,v)=>a+v.contextScore,0)/10).toFixed(1));
  const critCount=top10.filter(v=>v.contextScore>=8).length;
  const kevCount=top10.filter(v=>v.kev).length;
  const platCount=top10.filter(v=>(profile.techPillars||[]).some(pid=>v.affects.includes(pid))).length;

  const hoveredVuln=hovered?top10.find(v=>v.id===hovered):null;
  const rem=hoveredVuln?VULN_REMEDIATION[hoveredVuln.id]:null;

  const handleMouseEnter=(v,e)=>{
    const rect=containerRef.current?.getBoundingClientRect();
    const svgRect=e.currentTarget.close
    if(!rect||!svgRect)return;
    const relY=(e.clientY-rect.top);
    const relX=(e.clientX-rect.left);
    const side=relX>rect.width*0.5?"left":"right";
    setTooltipPos({x:relX,y:relY,side});
    setHovered(v.id);
  };

  /* SVG funnel dimensions */
  const W=900,layerH=46,topW=860,gap=2,pTop=8;
  const totalH=pTop+10*(layerH+gap)+8;

  const layers=top10.map((v,i)=>{
    const pct=(10-i)/10;
    const w=topW*(0.28+pct*0.72);
    const x=(W-w)/2;
    const y=pTop+i*(layerH+gap);
    const nextPct=(10-i-1)/10;
    const nw=topW*(0.28+nextPct*0.72);
    const nx=(W-nw)/2;
    const taper=(w-nw)/2;
    const col=sevCol(v.contextScore);
    const isHov=hovered===v.id;
    const points=`${x},${y} ${x+w},${y} ${x+w-taper},${y+layerH} ${nx},${y+layerH}`;
    return{v,i,x,y,w,col,isHov,points,nw};
  });

  return(
    <div className="fadein" ref={containerRef} style={{position:"relative"}}>

      {/* Profile banner */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,padding:"9px 13px",background:C.card,border:`1px solid ${C.border}`,borderRadius:9,alignItems:"center"}}>
        <span style={{fontSize:10,color:C.muted}}>Context:</span>
        <Chip label={ind?.label||"—"} color={ind?.color||C.accent}/>
        <Chip label={sc?.label||"—"} color={C.purple}/>
        <Chip label={geo?.label||"—"} color={C.cyan}/>
        <span style={{marginLeft:"auto",fontSize:10,color:C.dim}}>Score = CVSS × I×{ind?.multiplier} × S×{sc?.s_multiplier} × RegM×{geo?.regMultiplier} × PlatformM × TypeBoost</span>
      </div>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
        {[
          {label:"Avg contextual score",v:avgScore.toFixed(1),color:avgScore>=8?C.red:avgScore>=6?C.amber:C.accent},
          {label:"Critical (≥8.0)",v:critCount,color:C.red},
          {label:"KEV confirmed",v:kevCount,color:C.amber},
          {label:"Platform matched",v:platCount,color:C.green},
        ].map(k=>(
          <div key={k.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:4}}>{k.label}</div>
            <div style={{fontSize:22,fontWeight:800,color:k.color}}>{k.v}</div>
          </div>
        ))}
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
        {[["#f04060","Critical 8–10"],["#f5a623","High 6–8"],["#2d7ef7","Medium 4–6"],["#0ed27a","Low <4"]].map(([col,lbl])=>(
          <span key={lbl} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:C.muted}}>
            <span style={{width:8,height:8,borderRadius:2,background:col,display:"inline-block"}}></span>{lbl}
          </span>
        ))}
        <span style={{marginLeft:"auto",fontSize:10,color:C.dim,fontStyle:"italic"}}>Hover any layer for details & remediation</span>
      </div>

      {/* Full-width SVG funnel */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 12px",position:"relative",overflow:"visible"}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:12,textAlign:"center"}}>
          Top 10 contextual vulnerabilities — {ind?.label} · {sc?.label}
        </div>
        <svg
          viewBox={`0 0 ${W} ${totalH}`}
          width="100%"
          style={{display:"block",overflow:"visible"}}
          xmlns="http://www.w3.org/2000/svg"
        >
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          {layers.map(({v,i,x,y,w,col,isHov,points,nw})=>{
            /* 3-D side faces */
            const depth=8;
            const leftFace=`${x},${y} ${x-depth},${y+depth} ${x-depth+(x-((W-(nw))/2))},${y+layerH+depth} ${x},${y+layerH}`;
            /* not used but kept for reference */
            return(
              <g key={v.id}
                onMouseEnter={e=>handleMouseEnter(v,e)}
                onMouseLeave={()=>setHovered(null)}
                style={{cursor:"crosshair",transition:"opacity .15s"}}
                opacity={hovered&&!isHov?".55":"1"}
              >
                {/* shadow / depth bottom */}
                <polygon
                  points={`${x+4},${y+layerH} ${x+w-nw/2+4},${y+layerH} ${x+w-((w-nw)/2)+4},${y+layerH+5} ${x+4},${y+layerH+5}`}
                  fill={col+"18"}
                />
                {/* main trapezoid */}
                <polygon
                  points={points}
                  fill={isHov?col+"45":col+"22"}
                  stroke={col}
                  strokeWidth={isHov?"2":"0.8"}
                  filter={isHov?"url(#glow)":"none"}
                  style={{transition:"fill .12s,stroke-width .12s"}}
                />
                {/* left 3-D bevel */}
                <polygon
                  points={`${x},${y} ${x-6},${y+5} ${x-6},${y+layerH+2} ${x},${y+layerH}`}
                  fill={col+"30"}
                />
                {/* right 3-D bevel */}
                <polygon
                  points={`${x+w},${y} ${x+w+6},${y+5} ${x+w+6-(w-nw)/2},${y+layerH+2} ${x+w-(w-nw)/2},${y+layerH}`}
                  fill={col+"18"}
                />

                {/* rank */}
                <text x={x+10} y={y+layerH/2+5} fontSize="11" fontWeight="800" fill={col} opacity=".9">#{i+1}</text>

                {/* CVE ID */}
                <text x={x+36} y={y+layerH/2-5} fontSize="11" fontWeight="700" fill={isHov?col:"#dde4f0"} style={{fontFamily:"monospace"}}>
                  {v.id}
                </text>

                {/* Description truncated */}
                <text x={x+36} y={y+layerH/2+10} fontSize="9.5" fill="#8a9bc0">
                  {v.desc.length>62?v.desc.slice(0,61)+"…":v.desc}
                </text>

                {/* KEV badge */}
                {v.kev&&(
                  <g>
                    <rect x={W/2-14} y={y+layerH/2-6} width={28} height={12} rx="2" fill="#f0406028" stroke="#f04060" strokeWidth="0.6"/>
                    <text x={W/2} y={y+layerH/2+4} fontSize="8" fontWeight="800" fill="#f04060" textAnchor="middle">KEV</text>
                  </g>
                )}

                {/* EPSS */}
                <text x={W-x-w+nw/2+50} y={y+layerH/2-5} fontSize="9" fill={v.epss>.8?"#f04060":v.epss>.5?"#f5a623":"#0ed27a"} textAnchor="middle">
                  EPSS {Math.round(v.epss*100)}%
                </text>

                {/* score */}
                <text x={x+w-14} y={y+layerH/2+5} fontSize="13" fontWeight="900" fill={col} textAnchor="end">{v.contextScore.toFixed(1)}</text>

                {/* CVSS strikethrough base */}
                <text x={x+w-14} y={y+layerH/2+17} fontSize="9" fill="#3a4a6b" textAnchor="end" textDecoration="line-through">{v.cvss}</text>
              </g>
            );
          })}
        </svg>

        {/* HOVER TOOLTIP — rendered as HTML overlay inside funnel card */}
        {hoveredVuln&&rem&&(()=>{
          const col=sevCol(hoveredVuln.contextScore);
          const bg=sevBgCol(hoveredVuln.contextScore);
          const isPlatMatch=(profile.techPillars||[]).some(pid=>hoveredVuln.affects.includes(pid));
          const isBoost=(IND_PROFILE_VULN[profile.industry]?.boost||[]).includes(hoveredVuln.type);
          const isSuppress=(IND_PROFILE_VULN[profile.industry]?.suppress||[]).includes(hoveredVuln.type);

          /* position: always full-width below the funnel card, anchored via margin */
          return(
            <div style={{
              position:"absolute",
              top:tooltipPos.y+10,
              ...(tooltipPos.side==="right"?{left:"50%"}:{right:"50%",transform:"translateX(0)"}),
              width:420,
              background:"#0c1220",
              border:`1.5px solid ${col}60`,
              borderRadius:12,
              padding:"14px 16px",
              zIndex:100,
              boxShadow:`0 8px 32px ${col}30`,
              pointerEvents:"none",
            }}>
              {/* Header */}

  const W=480,pTop=20,layerH=68,gap=0;

  const maxW=400;

  const trapPoints=(i)=>{
    const pct=stages[i].pct/100;
    const nextPct=i<stages.length-1?stages[i+1].pct/100:stages[i].pct/100*0.6;
    const w=Math.max(maxW*nextPct*0.4,maxW*(0.18+pct*0.82));
    const nw=Math.max(maxW*nextPct*0.35,maxW*(0.14+nextPct*0.82));
    const x=(W-w)/2, nx=(W-nw)/2;
    const y=pTop+i*layerH;
    const taper=(w-nw)/2;
    return{x,y,w,nw,nx,taper,pts:`${x},${y} ${x+w},${y} ${x+w-taper},${y+layerH} ${nx},${y+layerH}`};
  };

  return(
    <div className="fadein">
      {/* Header */}
      <div style={{marginBottom:16,padding:"12px 16px",background:C.card,border:`1px solid ${C.border}`,borderRadius:10}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Intelligence processing funnel</div>
        <div style={{fontSize:15,fontWeight:800,color:C.text,marginBottom:4}}>From {liveList.length} CVEs → 10 contextual threats</div>
        <div style={{fontSize:11,color:C.muted}}>How the scoring engine processes, filters, and ranks every vulnerability to produce your sector-specific top 10</div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"start"}}>

        {/* LEFT — Inverted SVG funnel */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 10px 16px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:14,textAlign:"center"}}>
            {ind?.label} · {sc?.label} — Processing funnel
          </div>
          <svg viewBox={`0 0 ${W} ${totalH}`} width="100%" style={{display:"block",overflow:"visible"}} xmlns="http://www.w3.org/2000/svg">
            <defs>
              {stages.map(s=>(
                <linearGradient key={s.id} id={`grad-${s.id}`} x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor={s.stroke} stopOpacity="0.08"/>
                  <stop offset="50%" stopColor={s.stroke} stopOpacity="0.25"/>
                  <stop offset="100%" stopColor={s.stroke} stopOpacity="0.08"/>
                </linearGradient>
              ))}
            </defs>

            {stages.map((s,i)=>{
              const {x,y,w,nw,nx,taper,pts}=trapPoints(i);
              const isHov=hovered===s.id;
              const isLast=i===stages.length-1;
              /* dashed connector line to right annotation */
              const midY=y+layerH/2;
              const rightEdge=x+w-taper/2;

              return(
                <g key={s.id}
                  onMouseEnter={()=>setHovered(s.id)}
                  onMouseLeave={()=>setHovered(null)}
                  style={{cursor:"default",transition:"opacity .15s"}}
                  opacity={hovered&&!isHov?.7:1}
                >
                  {/* Main trapezoid */}
                  <polygon points={pts}
                    fill={isHov?s.stroke+"40":`url(#grad-${s.id})`}
                    stroke={s.stroke}
                    strokeWidth={isHov?"2.5":"1.2"}
                    style={{transition:"all .15s"}}
                  />

                  {/* Stage label */}
                  <text x={W/2} y={y+26} textAnchor="middle" fontSize="12" fontWeight="700" fill="#dde4f0">{s.label}</text>

                  {/* Count */}
                  <text x={W/2} y={y+44} textAnchor="middle" fontSize="11" fill={s.stroke} fontWeight="600">
                    ~{s.count.toLocaleString()} {s.unit}
                  </text>

                  {/* Separator line between layers */}
                  {!isLast&&(
                    <line x1={nx} y1={y+layerH} x2={nx+nw} y2={y+layerH} stroke={s.stroke} strokeWidth="0.6" strokeOpacity="0.5"/>
                  )}

                  {/* Dashed connector + filter note */}
                  {s.filterNote&&(
                    <g>
                      <line x1={rightEdge} y1={midY} x2={rightEdge+20} y2={midY} stroke={s.stroke} strokeWidth="0.8" strokeDasharray="3,2" strokeOpacity=".7"/>
                      <line x1={rightEdge+20} y1={midY} x2={W-8} y2={midY} stroke={s.stroke} strokeWidth="0.8" strokeDasharray="3,2" strokeOpacity=".7"/>
                      <circle cx={rightEdge} cy={midY} r="2.5" fill={s.stroke} opacity=".8"/>
                    </g>
                  )}
                </g>
              );
            })}

            {/* Bottom label */}
            <text x={W/2} y={totalH-8} textAnchor="middle" fontSize="10" fill={C.muted}>Top 10 contextual threats delivered</text>
          </svg>
        </div>

        {/* RIGHT — Annotation cards + stage details */}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {stages.map((s,i)=>{
            const isHov=hovered===s.id;
            return(
              <div key={s.id}
                onMouseEnter={()=>setHovered(s.id)}
                onMouseLeave={()=>setHovered(null)}
                style={{
                  padding:"10px 13px",
                  background:isHov?s.stroke+"18":C.card,
                  border:`1px solid ${isHov?s.stroke+"80":C.border}`,
                  borderRadius:8,
                  borderLeft:`3px solid ${s.stroke}`,
                  cursor:"default",
                  transition:"all .15s",
                }}
              >
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:3}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:9,fontWeight:800,color:s.stroke,background:s.stroke+"20",padding:"1px 6px",borderRadius:3}}>STAGE {i+1}</span>
                    <span style={{fontSize:12,fontWeight:700,color:C.text}}>{s.label}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:900,color:s.stroke}}>{s.count}</span>
                </div>
                <div style={{fontSize:10,color:C.muted,lineHeight:1.5,marginBottom:s.filterNote?5:0}}>{s.sublabel}</div>
                {s.filterNote&&(
                  <div style={{fontSize:10,color:s.stroke,background:s.stroke+"12",padding:"4px 8px",borderRadius:5,border:`1px solid ${s.stroke}30`}}>
                    {s.filterNote}
                  </div>
                )}
              </div>
            );
          })}

          {/* Top 10 mini-list */}
          <div style={{padding:"10px 13px",background:C.card,border:`1px solid ${C.red}40`,borderRadius:8,borderLeft:`3px solid ${C.red}`,marginTop:4}}>
            <div style={{fontSize:10,fontWeight:700,color:C.red,textTransform:"uppercase",letterSpacing:.7,marginBottom:8}}>Final top 10 — {ind?.label}</div>
            {top10.map((v,i)=>{
              const col=sevCol(v.contextScore);
              return(
                <div key={v.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:i<9?5:0,paddingBottom:i<9?5:0,borderBottom:i<9?`1px solid ${C.border}`:"none"}}>
                  <span style={{fontSize:9,fontWeight:800,color:C.muted,minWidth:18}}>#{i+1}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:10,fontWeight:700,color:C.text,fontFamily:"monospace"}}>{v.id}</div>
                    <div style={{fontSize:9,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.desc}</div>
                  </div>
                  <span style={{fontSize:11,fontWeight:800,color:col,flexShrink:0}}>{v.contextScore.toFixed(1)}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INSIGHT FUNNEL — matches reference: centered text, solid colors,
   dashed right-side annotations, hover tooltip
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
</script>
<script type="text/jsxcode" id="c5">function InsightFunnel({profile,liveVulns}){
  const [hovered,setHovered]=useState(null);
  const [tipPos,setTipPos]=useState({x:0,y:0});
  const wrapRef=useRef(null);
  const ind=INDUSTRIES.find(i=>i.id===profile.industry);
  const sc=SCALES.find(s=>s.id===profile.scale);
  const geo=GEOS.find(g=>g.id===profile.geo)||GEOS.find(g=>g.id==="other");
  const top10=getTop10Vulns(profile,liveVulns);
  const liveList = (liveVulns && liveVulns.length > 0) ? liveVulns : VULNS;
  const kevCount=top10.filter(v=>v.kev).length;

  const steps=[
    {
      id:"pool",     num:"10,000",  count:10000,
      label:"Global CVE pool",      sub:"All sources ingested",
      tag:null,
      color:"#1a3a6b",
      detail:"Every known vulnerability published this week across NVD, CISA KEV, MSRC, GHSA, AlienVault OTX, SANS ISC, VulnCheck, and 2026 specialist AI/OT intelligence feeds. This is the raw unfiltered global threat landscape.",
      insight:null, removed:null,
    },
    {
      id:"industry", num:"4,800",   count:4800,
      label:"Industry filter",      sub:`${ind?.label} relevance applied`,
      tag:"−5,200  industry-irrelevant",
      color:"#2d4a9b",
      detail:`Eliminated vulnerabilities with zero historical or operational relevance to ${ind?.label}. If a threat type has no precedent in your sector and no match to your platforms, it is removed entirely.`,
      insight:`Industry factor I=${ind?.multiplier}×. Boosted types: ${(IND_PROFILE_VULN[profile.industry]?.boost||[]).slice(0,3).map(t=>t.replace(/_/g," ")).join(", ")}.`,
      removed:5200,
    },
    {
      id:"platform", num:"2,100",   count:2100,
      label:"Platform surface",     sub:`${(profile.techPillars||[]).length} platform pillars matched`,
      tag:"−2,700  wrong platform stack",
      color:"#6b3fa0",
      detail:`Removed CVEs targeting platforms you don't operate. Only vulnerabilities affecting your declared tech stack proceed. Platform-matched CVEs score ×1.18; unmatched score ×0.55 and fall below threshold.`,
      insight:`Your declared platforms: ${(profile.techPillars||[]).map(pid=>TECH_PILLARS.find(t=>t.id===pid)?.label||pid).join(", ")||"none configured"}.`,
      removed:2700,
    },
    {
      id:"scale",    num:"800",     count:800,
      label:"Scale & region",       sub:`S=${sc?.s_multiplier}× · RegM=${geo?.regMultiplier}×`,
      tag:"−1,300  below threshold after weighting",
      color:"#1a7a4a",
      detail:`Applied size multiplier S=${sc?.s_multiplier}× for ${sc?.label} and regional regulatory weight RegM=${geo?.regMultiplier}× for ${geo?.label}. Vulnerabilities falling below the actionable score threshold after these multipliers are removed.`,
      insight:`Regulatory obligations: ${geo?.reg}`,
      removed:1300,
    },
    {
      id:"exploit",  num:"180",     count:180,
      label:"Active exploitation",  sub:"CISA KEV · EPSS · Dark web confirmed",
      tag:"−620  theoretical only, no exploitation",
      color:"#b04a10",
      detail:"Eliminated vulnerabilities with no confirmed real-world exploitation evidence. CISA KEV status, EPSS probability >60%, dark web chatter, and honeypot telemetry all checked. Theoretical vulnerabilities are deprioritised.",
      insight:`${kevCount} of your final top 10 are CISA KEV-confirmed. Avg EPSS across your top 10: ${Math.round(top10.reduce((a,v)=>a+v.epss,0)/10*100)}%.`,
      removed:620,
    },
    {
      id:"scoring",  num:"52",      count:52,
      label:"Contextual scoring",   sub:`CVSS × I×S×RegM×Platform×Type×KEV`,
      tag:"−128  scored below 6.0",
      color:"#8a3a10",
      detail:`Full formula applied: CVSS × I(${ind?.multiplier}) × S(${sc?.s_multiplier}) × RegM(${geo?.regMultiplier}) × PlatformM × TypeBoost × KEV × SourceConf. Sorted descending. Those below 6.0 are dropped.`,
      insight:"This is where generic CVSS and your contextual score diverge most. Some CVEs drop; others amplify significantly for your environment.",
      removed:128,
    },
    {
      id:"top10",    num:"10",      count:10,
      label:"Your top 10",          sub:"Highest contextual risk · action required",
      tag:null,
      color:"#a01828",
      detail:`The 10 vulnerabilities with the highest contextual risk score for your organisation this week. From 10,000 to 10 — these are the only ones requiring immediate action.`,
      insight:"That is the RiskSync intelligence advantage: 10,000 CVEs filtered to the 10 that are real, relevant, and urgent for your specific environment.",
      removed:null,
      isFinal:true,
    },
  ];

  /* ── SVG geometry ── */
  /* Total canvas: funnel on left, annotation zone on right */
  const VW=880;          /* total viewBox width                   */
  const FW=480;          /* funnel drawing area width             */
  const AX=510;          /* annotation start X (dashed line end)  */
  const AW=360;          /* annotation box width                  */
  const layerH=78;       /* height of each trapezoid              */
  const gap=0;           /* no gap — flush layers like reference  */
  const pTop=20;
  const totalH=pTop+steps.length*layerH+20;

  /* Funnel widths: top layer nearly full FW, bottom layer ~25% */
  const topW=FW-20;
  const botW=FW*0.25;
  const getW=i=>{
    const frac=i/(steps.length-1);
    return topW-(topW-botW)*frac;
  };
  /* X offset to center funnel in FW */
  const getX=i=>(FW-getW(i))/2;

  const hovStep=hovered?steps.find(s=>s.id===hovered):null;

  const handleMouseEnter=(s,e)=>{
    const rect=wrapRef.current?.getBoundingClientRect();
    if(!rect)return;
    setTipPos({x:e.clientX-rect.left,y:e.clientY-rect.top});
    setHovered(s.id);
  };
  const handleMouseMove=e=>{
    if(!hovered)return;
    const rect=wrapRef.current?.getBoundingClientRect();
    if(!rect)return;
    setTipPos({x:e.clientX-rect.left,y:e.clientY-rect.top});
  };

  return(
    <div style={{background:"#0c1628",border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>

      {/* Header */}
      <div style={{padding:"16px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:16,fontWeight:800,color:"#fff",letterSpacing:.2}}>10,000 vulnerabilities → 10 that matter</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>How RiskSync filters global CVE noise to your specific threats · hover any layer for detail</div>
        </div>
        <div style={{display:"flex",gap:18}}>
          {[["10,000","Global",C.accent],["180","Exploited","#f04060"],["10","Yours","#f04060"]].map(([n,l,c])=>(
            <div key={n} style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:900,color:c,lineHeight:1}}>{n}</div>
              <div style={{fontSize:9,color:C.muted,marginTop:2}}>{l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Funnel + tooltip container */}
      <div ref={wrapRef} style={{position:"relative",padding:"20px 16px 20px 16px",background:"#0c1628"}}
        onMouseMove={handleMouseMove}
        onMouseLeave={()=>setHovered(null)}
      >
        <svg
          viewBox={`0 0 ${VW} ${totalH}`}
          width="100%"
          style={{display:"block",overflow:"visible"}}
          xmlns="http://www.w3.org/2000/svg"
        >
          {steps.map((s,i)=>{
            const w  = getW(i);
            const nw = i<steps.length-1 ? getW(i+1) : botW*0.55;
            const x  = getX(i);
            const nx = i<steps.length-1 ? getX(i+1) : (FW-nw)/2;
            const y  = pTop+i*layerH;
            const taper=(w-nw)/2;
            const pts=`${x},${y} ${x+w},${y} ${x+w-taper},${y+layerH} ${nx},${y+layerH}`;
            const midY=y+layerH/2;
            const isH=hovered===s.id;
            /* right edge midpoint for dashed connector */
            const connX=x+w-taper/2;

            return(
              <g key={s.id}
                onMouseEnter={e=>handleMouseEnter(s,e)}
                style={{cursor:"pointer",filter:hovered&&!isH?"brightness(0.65)":"none",transition:"filter .15s"}}
              >
                {/* Solid filled trapezoid */}
                <polygon
                  points={pts}
                  fill={s.color}
                  stroke={isH?"rgba(255,255,255,0.6)":"rgba(255,255,255,0.08)"}
                  strokeWidth={isH?"1.5":"0.5"}
                  style={{transition:"stroke .12s"}}
                />

                {/* Top highlight edge */}
                <line x1={x} y1={y} x2={x+w} y2={y} stroke="rgba(255,255,255,0.18)" strokeWidth="1"/>

                {/* CENTER label — main */}
                <text
                  x={FW/2} y={midY-10}
                  textAnchor="middle"
                  fontSize="15" fontWeight="700" fill="#ffffff"
                  style={{fontFamily:"'IBM Plex Mono',monospace",pointerEvents:"none"}}
                >
                  {s.label}
                </text>

                {/* CENTER count — big highlight */}
                <text
                  x={FW/2} y={midY+12}
                  textAnchor="middle"
                  fontSize="13" fontWeight="500" fill="rgba(255,255,255,0.75)"
                  style={{pointerEvents:"none"}}
                >
                  ~{s.num}
                </text>

                {/* Dashed connector line from right edge → annotation box */}
                {s.tag&&(
                  <g>
                    <circle cx={connX} cy={midY} r="3" fill={s.color} stroke="rgba(255,255,255,0.5)" strokeWidth="1"/>
                    <line
                      x1={connX} y1={midY}
                      x2={AX-8}  y2={midY}
                      stroke="rgba(255,255,255,0.35)"
                      strokeWidth="1"
                      strokeDasharray="5,3"
                    />
                    {/* Annotation pill */}
                    <rect
                      x={AX} y={midY-11}
                      width={AW-10} height={22}
                      rx="4"
                      fill="#0d1e3a"
                      stroke="rgba(255,255,255,0.15)"
                      strokeWidth="0.8"
                    />
                    <text
                      x={AX+10} y={midY+4}
                      fontSize="10" fontWeight="600"
                      fill="rgba(200,220,255,0.85)"
                      style={{pointerEvents:"none"}}
                    >
                      {s.tag}
                    </text>
                  </g>
                )}
              </g>
            );
          })}
        </svg>

        {/* HOVER TOOLTIP — HTML overlay */}
        {hovStep&&(()=>{
          const col=hovStep.color;
          const tipW=320;
          const goLeft=tipPos.x>VW*0.5;
          const left=Math.max(0,goLeft?tipPos.x-tipW-10:tipPos.x+14);
          const top=Math.max(8,tipPos.y-40);
          return(
            <div style={{
              position:"absolute",
              left,top,
              width:tipW,
              background:"#0a1220",
              border:`1.5px solid ${col}`,
              borderRadius:10,
              padding:"13px 15px",
              pointerEvents:"none",
              zIndex:60,
              boxShadow:`0 8px 28px rgba(0,0,0,.6)`,
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontSize:10,fontWeight:700,color:"rgba(200,220,255,.7)",textTransform:"uppercase",letterSpacing:.8,marginBottom:3}}>{hovStep.label}</div>
                  <div style={{fontSize:26,fontWeight:900,color:"#fff",lineHeight:1}}>~{hovStep.num}</div>
                  <div style={{fontSize:9,color:C.muted,marginTop:2}}>remaining after this stage</div>
                </div>
                {hovStep.removed&&(
                  <div style={{textAlign:"right",padding:"7px 10px",background:"rgba(240,64,96,0.15)",borderRadius:7,border:"1px solid rgba(240,64,96,0.35)"}}>
                    <div style={{fontSize:17,fontWeight:900,color:"#f04060",lineHeight:1}}>−{hovStep.removed.toLocaleString()}</div>
                    <div style={{fontSize:9,color:"#f04060",marginTop:2}}>eliminated</div>
                  </div>
                )}
              </div>
              <div style={{fontSize:11,color:"rgba(180,200,230,.85)",lineHeight:1.65,marginBottom:hovStep.insight?9:0}}>
                {hovStep.detail}
              </div>
              {hovStep.insight&&(
                <div style={{padding:"7px 10px",background:"rgba(255,255,255,0.05)",borderRadius:6,border:"1px solid rgba(255,255,255,0.1)",fontSize:10,color:"rgba(180,210,255,.8)",lineHeight:1.55}}>
                  {hovStep.insight}
                </div>
              )}
              {/* reduction bar */}
              <div style={{marginTop:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.muted,marginBottom:3}}>
                  <span>Remaining of 10,000</span>
                  <span style={{color:"#fff",fontWeight:700}}>{hovStep.count>=10000?"100%":hovStep.count>=1000?(hovStep.count/100).toFixed(0)+"%":hovStep.count<100?"<1%":(hovStep.count/100).toFixed(1)+"%"}</span>
                </div>
                <div style={{height:4,background:"rgba(255,255,255,0.08)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{width:`${Math.max(0.5,(hovStep.count/10000)*100)}%`,height:"100%",background:hovStep.color,borderRadius:2}}/>
                </div>
              </div>
            </div>
          );
        })()}
      </div>

      {/* Footer */}
      <div style={{padding:"10px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0a1220"}}>
        <div style={{fontSize:10,color:C.dim,fontStyle:"italic"}}>Hover any layer to see what was filtered and why</div>
        <div style={{display:"flex",gap:14}}>
          {steps.filter((_,i)=>[0,2,4,6].includes(i)).map(s=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:10,height:10,borderRadius:2,background:s.color}}/>
              <span style={{fontSize:9,color:C.muted}}>{s.num}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROLE-BASED UX SYSTEM
   Executive  → 1-screen brief, traffic-light, 3 actions max
   Manager    → weekly summary, top threats, team tasks

   Admin      → sources, scoring config, profile, export
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   OP-CENTER SHELL — matches reference screenshot
   Left sidebar · live telemetry bar · all pages unified
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ── NAV PAGES ── */
/* ── SIDEBAR ── */

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   WEEKLY BULLETIN PAGE
   - Live preview of today's brief
   - Subscription management
   - One-click HTML export
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function BulletinPage({profile, liveVulns, controls, activeCategory}) {
  const [email, setEmail]       = useState('');
  const [subscribed, setSubscribed] = useState(false);
  const [frequency, setFrequency]   = useState('daily');
  const [sections, setSections]     = useState({
    execSummary: true, top5Threats: true, kevAlert: true,
    controlRec: true, regulatoryNote: true, insightFunnel: false,
  });
  const [copied, setCopied] = useState(false);
  const [selectedIndustry, setSelectedIndustry] = useState(profile.industry || 'finance');
  const [selectedScale, setSelectedScale]       = useState(profile.scale    || 'mid');
  const [selectedGeo, setSelectedGeo]           = useState(profile.geo      || 'us');

  const ind     = INDUSTRIES.find(i => i.id === selectedIndustry);
  const sc      = SCALES.find(s => s.id === selectedScale);
  const geo     = GEOS.find(g => g.id === profile.geo) || GEOS.find(g => g.id === 'other');
  const _rawList  = (liveVulns && liveVulns.length > 0) ? liveVulns : VULNS;
  const filteredList = filterByCategory(_rawList, activeCategory);
  const bulletinProfile = {...profile, industry: selectedIndustry, scale: selectedScale, geo: selectedGeo};
  const top10   = getTop10Vulns(bulletinProfile, filteredList);
  const gScore  = globalRisk(bulletinProfile, controls);
  const top5    = top10.slice(0, 5);

  const kevHits = top10.filter(v => v.kev);
  const col     = gScore >= 8 ? C.red : gScore >= 6 ? C.amber : C.green;
  const lbl     = gScore >= 8 ? 'CRITICAL' : gScore >= 6 ? 'HIGH' : 'MANAGED';
  const vc      = n => n >= 8 ? '#f04060' : n >= 6 ? '#f5a623' : n >= 4 ? '#2d7ef7' : '#0ed27a';
  const vl      = n => n >= 8 ? 'Critical' : n >= 6 ? 'High' : n >= 4 ? 'Medium' : 'Low';
  const weekStr = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  

  /* ── Generate HTML email ── */
  const generateEmail = () => {
    const threatRows = top5.map((v,i) => {
      const c = v.contextScore >= 8 ? '#f04060' : v.contextScore >= 6 ? '#f5a623' : '#2d7ef7';
      return `<tr style="border-bottom:1px solid #1a2540">
        <td style="padding:10px 12px;font-size:11px;color:#888;font-family:monospace">#${i+1}</td>
        <td style="padding:10px 12px;font-size:12px;color:#dde4f0;line-height:1.4">${v.desc.length>80?v.desc.slice(0,79)+'…':v.desc}</td>
        <td style="padding:10px 12px;font-size:10px;color:#888;font-family:monospace">${v.id}</td>
        <td style="padding:10px 12px;text-align:center"><span style="background:${c}22;color:${c};border:1px solid ${c}44;border-radius:3px;padding:2px 8px;font-size:10px;font-weight:700">${vl(v.contextScore)}</span></td>
        <td style="padding:10px 12px;text-align:right;font-size:14px;font-weight:700;color:${c}">${v.contextScore.toFixed(1)}</td>
      </tr>`;
    }).join('');

    const kevRows = kevHits.slice(0,3).map(v => `
      <tr>
        <td style="padding:8px 12px;font-size:10px;font-family:monospace;color:#f04060">${v.id}</td>
        <td style="padding:8px 12px;font-size:11px;color:#dde4f0">${v.desc.length>70?v.desc.slice(0,69)+'…':v.desc}</td>
        <td style="padding:8px 12px;text-align:right;font-size:12px;font-weight:700;color:#f04060">${v.contextScore.toFixed(1)}</td>
      </tr>`).join('');

    return `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RiskSync Daily Threat Brief — ${weekStr}</title>
</head>
<body style="margin:0;padding:0;background:#050c18;font-family:'Courier New',monospace">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#050c18">
<tr><td align="center" style="padding:32px 16px">
<table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%">

  <!-- HEADER -->
  <tr><td style="background:#080d18;border:1px solid #1a2540;border-radius:10px 10px 0 0;padding:24px 28px">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td>
          <div style="display:inline-block;width:32px;height:32px;background:#2d7ef7;border-radius:7px;text-align:center;line-height:32px;font-size:16px;margin-bottom:10px">⚡</div>
          <div style="font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px">RISKSYNC</div>
          <div style="font-size:10px;color:#5a6f96;margin-top:2px;letter-spacing:1px">DAILY THREAT BRIEF · ${weekStr.toUpperCase()}</div>
        </td>
        <td align="right" style="vertical-align:top">
          <div style="font-size:11px;color:#5a6f96">${weekStr}</div>
          <div style="margin-top:6px;background:${gScore>=8?'#1e0810':gScore>=6?'#1e1200':'#051a10'};border:1px solid ${col}40;border-radius:5px;padding:6px 14px;display:inline-block">
            <div style="font-size:11px;font-weight:700;color:${col}">${lbl} · ${gScore.toFixed(1)}/10</div>
          </div>
        </td>
      </tr>
    </table>
  </td></tr>

  <!-- PROFILE STRIP -->
  <tr><td style="background:#0c1220;border-left:1px solid #1a2540;border-right:1px solid #1a2540;padding:10px 28px">
    <table cellpadding="0" cellspacing="0"><tr>
      <td style="font-size:9px;color:#5a6f96;letter-spacing:.8px;padding-right:16px">PROFILE</td>
      <td style="padding-right:10px"><span style="background:${ind?.color||'#2d7ef7'}22;color:${ind?.color||'#2d7ef7'};border:1px solid ${ind?.color||'#2d7ef7'}44;border-radius:3px;padding:2px 9px;font-size:10px;font-weight:700">${ind?.label}</span></td>
      <td style="padding-right:10px"><span style="background:#9b72f622;color:#9b72f6;border:1px solid #9b72f644;border-radius:3px;padding:2px 9px;font-size:10px;font-weight:700">${sc?.label}</span></td>
      <td><span style="background:#22d3ee22;color:#22d3ee;border:1px solid #22d3ee44;border-radius:3px;padding:2px 9px;font-size:10px;font-weight:700">${geo?.label}</span></td>
    </tr></table>
  </td></tr>

  ${sections.execSummary ? `
  <!-- EXEC SUMMARY -->
  <tr><td style="background:#080d18;border-left:1px solid #1a2540;border-right:1px solid #1a2540;padding:24px 28px;border-top:1px solid #1a2540">
    <div style="font-size:9px;font-weight:700;color:#5a6f96;letter-spacing:1px;margin-bottom:10px">DAILY RISK SUMMARY</div>
    <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;line-height:1.4">
      Your ${ind?.label} organisation faces <span style="color:${col}">${lbl.toLowerCase()}</span> cybersecurity exposure today.
    </div>
    <div style="font-size:12px;color:#8a9bc0;line-height:1.8">
      Based on ${(profile.sources||[]).length} active intelligence sources, <strong style="color:#dde4f0">${kevHits.length} of your top 10 threats are actively exploited</strong> in the wild (CISA KEV confirmed). 
      Your contextual risk score of <strong style="color:${col}">${gScore.toFixed(1)}</strong> reflects your industry multiplier of ×${ind?.multiplier}, 
      scale factor ×${sc?.s_multiplier}, and regional weight ×${geo?.regMultiplier}.
    </div>
    <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:16px">
      <tr>
        ${[
          {label:'Risk Score', val:gScore.toFixed(1), col},
          {label:'KEV Confirmed', val:String(kevHits.length), col:'#f04060'},
          {label:'Avg EPSS', val:Math.round(top5.reduce((a,v)=>a+v.epss,0)/5*100)+'%', col:'#f5a623'},
          {label:'Critical Threats', val:String(top10.filter(v=>v.contextScore>=8).length), col:'#f04060'},
        ].map(k=>`<td align="center" style="background:#0c1220;border:1px solid #1a2540;border-radius:6px;padding:12px 8px;width:25%">
          <div style="font-size:20px;font-weight:700;color:${k.col}">${k.val}</div>
          <div style="font-size:9px;color:#5a6f96;margin-top:3px">${k.label}</div>
        </td>`).join('<td width="8"></td>')}
      </tr>
    </table>
  </td></tr>` : ''}

  ${sections.kevAlert && kevHits.length > 0 ? `
  <!-- KEV ALERT -->
  <tr><td style="background:#1e0810;border:1px solid #f0406030;border-left:4px solid #f04060;padding:16px 28px;margin-top:0">
    <div style="font-size:9px;font-weight:700;color:#f04060;letter-spacing:1px;margin-bottom:10px">⚠ CISA KEV ALERT — ${kevHits.length} ACTIVELY EXPLOITED</div>
    <table width="100%" cellpadding="0" cellspacing="0">
      ${kevRows}
    </table>
    <div style="font-size:10px;color:#f04060;margin-top:10px">These vulnerabilities have confirmed real-world exploitation. Immediate patching required.</div>
  </td></tr>` : ''}

  ${sections.top5Threats ? `
  <!-- TOP 5 THREATS -->
  <tr><td style="background:#080d18;border-left:1px solid #1a2540;border-right:1px solid #1a2540;border-top:1px solid #1a2540;padding:24px 28px">
    <div style="font-size:9px;font-weight:700;color:#5a6f96;letter-spacing:1px;margin-bottom:14px">TOP 5 CONTEXTUAL THREATS — ${ind?.label?.toUpperCase()}</div>
    <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #1a2540;border-radius:6px;overflow:hidden">
      <tr style="background:#0c1220">
        <td style="padding:8px 12px;font-size:9px;color:#5a6f96;font-weight:700">#</td>
        <td style="padding:8px 12px;font-size:9px;color:#5a6f96;font-weight:700">DESCRIPTION</td>
        <td style="padding:8px 12px;font-size:9px;color:#5a6f96;font-weight:700">CVE</td>
        <td style="padding:8px 12px;font-size:9px;color:#5a6f96;font-weight:700;text-align:center">SEVERITY</td>
        <td style="padding:8px 12px;font-size:9px;color:#5a6f96;font-weight:700;text-align:right">SCORE</td>
      </tr>
      ${threatRows}
    </table>
  </td></tr>` : ''}

  ${sections.controlRec ? `
  <!-- CONTROL RECOMMENDATION -->
  <tr><td style="background:#0d1f3c;border-left:1px solid #2d7ef740;border-right:1px solid #2d7ef740;border-top:1px solid #2d7ef730;padding:20px 28px">
    <div style="font-size:9px;font-weight:700;color:#2d7ef7;letter-spacing:1px;margin-bottom:10px">TODAY'S PRIORITY ACTION</div>
    <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:6px">${VULN_REMEDIATION[top5[0]?.id]?.steps[0] || 'Review and patch all KEV-listed vulnerabilities within 14 days per CISA BOD 22-01.'}</div>
    <div style="font-size:11px;color:#8a9bc0;line-height:1.7">${VULN_REMEDIATION[top5[0]?.id]?.urgency || 'Prioritise your top CISA KEV entries immediately.'}</div>
  </td></tr>` : ''}

  ${sections.regulatoryNote ? `
  <!-- REGULATORY NOTE -->
  <tr><td style="background:#080d18;border-left:1px solid #1a2540;border-right:1px solid #1a2540;border-top:1px solid #1a2540;padding:16px 28px">
    <div style="font-size:9px;font-weight:700;color:#5a6f96;letter-spacing:1px;margin-bottom:8px">REGULATORY CONTEXT · ${geo?.label?.toUpperCase()}</div>
    <div style="font-size:11px;color:#8a9bc0;line-height:1.7">${geo?.reg} — Organisations operating in ${geo?.label} must maintain compliance. ${kevHits.length > 0 ? `${kevHits.length} of today's threats directly trigger mandatory notification obligations if exploited.` : 'No immediate notification triggers today.'}</div>
  </td></tr>` : ''}

  <!-- FOOTER -->
  <tr><td style="background:#050c18;border:1px solid #1a2540;border-radius:0 0 10px 10px;border-top:none;padding:20px 28px">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td style="font-size:10px;color:#2e3f62;line-height:1.7">
        <strong style="color:#5a6f96">RiskSync</strong> · Micro-GRC Intelligence Platform<br/>
        Scores computed using CVSS × I(${ind?.multiplier}) × S(${sc?.s_multiplier}) × RegM(${geo?.regMultiplier}) × PlatformM × TypeBoost × KEV<br/>
        Data sources: NIST NVD · CISA KEV · EPSS (FIRST.org) · ${(profile.sources||[]).length} active feeds<br/>
        <span style="color:#1a2540">You are receiving this as part of your RiskSync Daily Threat Brief. Sent every morning at 7:00 AM UTC.</span>
      </td>
      <td align="right" style="vertical-align:bottom">
        <div style="font-size:20px;color:#1a2540;font-weight:700">RS</div>
      </td>
    </tr></table>
  </td></tr>

</table>
</td></tr>
</table>
</body>
</html>`;
  };

  const handleCopyHTML = () => {
    const html = generateEmail();
    navigator.clipboard.writeText(html).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const handleDownloadHTML = () => {
    const html = generateEmail();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
    a.download = `RiskSync_DailyBrief_${new Date().toISOString().slice(0,10)}.html`;
    a.click();
  };

  const toggleSection = key => setSections(s => ({...s, [key]: !s[key]}));

  const SECTION_LABELS = {
    execSummary:'Daily Risk Summary', top5Threats:'Top 5 Threats',
    kevAlert:'KEV Alert Banner', controlRec:'Recommended Action',
    regulatoryNote:'Regulatory Note',
  };

  return (
    <div style={{display:'flex', height:'100%', overflow:'hidden'}}>

      {/* LEFT — Config panel */}
      <div style={{width:280, flexShrink:0, borderRight:`1px solid ${C.border}`, background:C.surface, display:'flex', flexDirection:'column', overflow:'hidden'}}>
        <div style={{padding:'16px 18px', borderBottom:`1px solid ${C.border}`, flexShrink:0}}>
          <div style={{fontSize:11, fontWeight:700, color:'#fff', textTransform:'uppercase', letterSpacing:.8, marginBottom:2}}>Weekly Bulletin</div>
          <div style={{fontSize:10, color:C.muted}}>Configure and preview your daily threat brief</div>
        </div>

        <div style={{flex:1, overflowY:'auto', padding:'16px 18px'}}>

          {/* Industry Filter */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:9, fontWeight:700, color:C.muted, textTransform:'uppercase', letterSpacing:.8, marginBottom:10}}>Preview For Industry</div>
            <select value={selectedIndustry} onChange={e=>setSelectedIndustry(e.target.value)}
              style={{width:'100%', padding:'7px 10px', borderRadius:5, border:`1px solid ${C.accent}50`, background:C.card, color:C.text, fontSize:11, marginBottom:8, boxSizing:'border-box', cursor:'pointer'}}>
              {INDUSTRIES.map(i=>(
                <option key={i.id} value={i.id}>{i.icon} {i.label}</option>
              ))}
            </select>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:6}}>
              <select value={selectedScale} onChange={e=>setSelectedScale(e.target.value)}
                style={{padding:'6px 8px', borderRadius:5, border:`1px solid ${C.border}`, background:C.card, color:C.text, fontSize:10, cursor:'pointer', boxSizing:'border-box'}}>
                {SCALES.map(s=>(
                  <option key={s.id} value={s.id}>{s.label}</option>
                ))}
              </select>
              <select value={selectedGeo} onChange={e=>setSelectedGeo(e.target.value)}
                style={{padding:'6px 8px', borderRadius:5, border:`1px solid ${C.border}`, background:C.card, color:C.text, fontSize:10, cursor:'pointer', boxSizing:'border-box'}}>
                {GEOS.map(g=>(
                  <option key={g.id} value={g.id}>{g.label}</option>
                ))}
              </select>
            </div>
            {selectedIndustry !== profile.industry && (
              <div style={{marginTop:6, fontSize:9, color:C.amber}}>
                Previewing as {ind?.label} — your profile is {INDUSTRIES.find(i=>i.id===profile.industry)?.label}
              </div>
            )}
          </div>

          {/* Subscription */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:9, fontWeight:700, color:C.muted, textTransform:'uppercase', letterSpacing:.8, marginBottom:10}}>Subscription</div>
            <input
              type="email"
              value={email}
              onChange={e=>setEmail(e.target.value)}
              placeholder="your@email.com"
              style={{width:'100%', padding:'8px 10px', borderRadius:5, border:`1px solid ${subscribed?C.green:C.border}`, background:C.card, color:C.text, fontSize:11, marginBottom:8, boxSizing:'border-box'}}
            />
            <div style={{display:'flex', gap:6, marginBottom:10}}>
              {[['daily','Every Day'],['weekdays','Weekdays Only'],['critical','Critical Alerts Only']].map(([val,lbl2])=>(
                <button key={val} onClick={()=>setFrequency(val)}
                  style={{flex:1, padding:'5px 0', borderRadius:4, border:`1px solid ${frequency===val?C.accent:C.border}`, background:frequency===val?C.accentBg:'transparent', color:frequency===val?C.accent:C.muted, fontSize:10, cursor:'pointer'}}>
                  {lbl2}
                </button>
              ))}
            </div>
            <button
              onClick={()=>{ if(email) setSubscribed(!subscribed); }}
              style={{width:'100%', padding:'9px', borderRadius:5, border:'none', background:subscribed?C.green:C.accent, color:subscribed?'#000':'#fff', fontSize:12, fontWeight:700, cursor:'pointer'}}>
              {subscribed ? '✓ Subscribed — Click to Unsubscribe' : 'Subscribe to Bulletin'}
            </button>
            {subscribed && <div style={{fontSize:10, color:C.green, marginTop:6, textAlign:'center'}}>Next delivery: {frequency==='daily'?'Tomorrow 7:00 AM':frequency==='weekdays'?'Mon-Fri 7:00 AM':'On new KEV additions'}</div>}
          </div>

          {/* Sections toggle */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:9, fontWeight:700, color:C.muted, textTransform:'uppercase', letterSpacing:.8, marginBottom:10}}>Email Sections</div>
            {Object.entries(SECTION_LABELS).map(([key,label])=>(
              <div key={key} onClick={()=>toggleSection(key)}
                style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px', marginBottom:5, background:C.card, borderRadius:5, cursor:'pointer', border:`1px solid ${sections[key]?C.accent+'40':C.border}`}}>
                <span style={{fontSize:11, color:sections[key]?C.text:C.muted}}>{label}</span>
                <div style={{width:30, height:16, borderRadius:8, background:sections[key]?C.accent:C.border, position:'relative', flexShrink:0, transition:'background .2s'}}>
                  <div style={{width:12, height:12, borderRadius:'50%', background:'#fff', position:'absolute', top:2, left:sections[key]?16:2, transition:'left .2s'}}/>
                </div>
              </div>
            ))}
          </div>

          {/* Schedule info */}
          <div style={{padding:'12px 14px', background:C.card, borderRadius:8, border:`1px solid ${C.border}`, marginBottom:16}}>
            <div style={{fontSize:9, fontWeight:700, color:C.muted, textTransform:'uppercase', letterSpacing:.8, marginBottom:8}}>Delivery Schedule</div>
            <div style={{fontSize:10, color:C.muted, lineHeight:1.8}}>
              Every <strong style={{color:C.text}}>7:00 AM UTC</strong> UTC<br/>
              Profile: <strong style={{color:ind?.color||C.accent}}>{ind?.label}</strong><br/>
              Sources: <strong style={{color:C.text}}>{(profile.sources||[]).length} active feeds</strong><br/>
              Format: <strong style={{color:C.text}}>HTML email</strong>
            </div>
          </div>

          {/* Setup note */}
          <div style={{padding:'10px 12px', background:C.amberBg, border:`1px solid ${C.amber}30`, borderRadius:6}}>
            <div style={{fontSize:9, fontWeight:700, color:C.amber, marginBottom:4}}>TO SEND AUTOMATICALLY</div>
            <div style={{fontSize:10, color:C.amber, lineHeight:1.6}}>Add Supabase + Resend integration for live delivery. Use the HTML export below to test in any email client now.</div>
          </div>
        </div>
      </div>

      {/* RIGHT — Preview */}
      <div style={{flex:1, display:'flex', flexDirection:'column', overflow:'hidden'}}>

        {/* Preview toolbar */}
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 20px', borderBottom:`1px solid ${C.border}`, background:C.surface, flexShrink:0}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <div style={{width:8, height:8, borderRadius:'50%', background:C.red}}/>
            <div style={{width:8, height:8, borderRadius:'50%', background:C.amber}}/>
            <div style={{width:8, height:8, borderRadius:'50%', background:C.green}}/>
            <span style={{fontSize:11, color:C.muted, marginLeft:8}}>Daily Threat Brief — {weekStr}</span>
          </div>
          <div style={{display:'flex', gap:8}}>
