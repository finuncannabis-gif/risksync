<script type="text/jsxcode" id="c6defs">
/* ── LIVE DATA ENGINE ── */
const CWE_TYPE_MAP = {
  "CWE-77":"injection","CWE-78":"injection","CWE-88":"injection","CWE-89":"injection",
  "CWE-79":"injection","CWE-94":"injection","CWE-611":"xxe","CWE-918":"api_abuse",
  "CWE-502":"deserialization","CWE-20":"injection","CWE-284":"auth","CWE-285":"auth",
  "CWE-287":"auth","CWE-288":"auth","CWE-306":"auth","CWE-522":"auth",
  "CWE-787":"memory_corruption","CWE-122":"privesc","CWE-416":"privesc","CWE-121":"memory_corruption",
  "CWE-269":"privesc","CWE-427":"supply_chain","CWE-506":"supply_chain",
  "CWE-601":"phishing","CWE-352":"auth","CWE-862":"auth","CWE-863":"auth",
};

function cpeToplatform(cpeStr){
  if(!cpeStr) return [];
  const s=cpeStr.toLowerCase(), out=[];
  if(s.includes("windows")||s.includes("microsoft")||s.includes("iis")) out.push("onprem");
  if(s.includes("apache")||s.includes("nginx")||s.includes("php")) out.push("web");
  if(s.includes("aws")||s.includes("azure")||s.includes("gcp")) out.push("cloud");
  if(s.includes("cisco")||s.includes("fortinet")||s.includes("palo")) out.push("onprem");
  if(s.includes("jenkins")||s.includes("github")||s.includes("gitlab")) out.push("cicd");
  if(s.includes("scada")||s.includes("siemens")||s.includes("modbus")) out.push("ot_ics");
  if(s.includes("exchange")||s.includes("sharepoint")) out.push("email");
  if(s.includes("salesforce")||s.includes("sap")) out.push("saas");
  return out.length>0?[...new Set(out)]:["onprem"];
}

function parseVector(v){
  if(!v) return "Network";
  if(v.includes("AV:N")) return "Network";
  if(v.includes("AV:L")) return "Local";
  return "Network";
}

function exploitStatus(isKev,epss){
  if(isKev) return "Active";
  if(epss>.7) return "Likely";
  if(epss>.3) return "Possible";
  return "Theoretical";
}

async function fetchLiveVulns(onProgress){
  try{
    onProgress("Connecting to CISA KEV...");
    const kevRes=await fetch("https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json");
    const kevData=await kevRes.json();
    const kevSet=new Set(kevData.vulnerabilities.map(v=>v.cveID));
    onProgress("CISA KEV loaded — "+kevSet.size+" confirmed exploited CVEs");
    
    onProgress("Querying NIST NVD...");
    const thirtyDaysAgo=new Date(Date.now()-30*86400000).toISOString().split(".")[0]+".000";
    const nvdUrl="https://services.nvd.nist.gov/rest/json/cves/2.0?cvssV3Severity=CRITICAL&pubStartDate="+thirtyDaysAgo+"&resultsPerPage=100";
    const nvdRes=await fetch(nvdUrl);
    const nvdData=await nvdRes.json();
    const nvdUrlH="https://services.nvd.nist.gov/rest/json/cves/2.0?cvssV3Severity=HIGH&pubStartDate="+thirtyDaysAgo+"&resultsPerPage=60";
    const nvdResH=await fetch(nvdUrlH);
    const nvdDataH=await nvdResH.json();
    const allNvd=[...(nvdData.vulnerabilities||[]),...(nvdDataH.vulnerabilities||[])];
    onProgress("NVD returned "+allNvd.length+" CVEs — enriching with EPSS...");
    
    const mapped=allNvd.map(entry=>{
      const cve=entry.cve, id=cve.id;
      const desc=cve.descriptions?.find(d=>d.lang==="en")?.value||"";
      const cwes=(cve.weaknesses||[]).flatMap(w=>w.description.map(d=>d.value));
      const cwe=cwes[0]||"CWE-0";
      const type=CWE_TYPE_MAP[cwe]||"injection";
      const metrics=cve.metrics?.cvssMetricV31?.[0]||cve.metrics?.cvssMetricV30?.[0]||cve.metrics?.cvssMetricV2?.[0];
      const cvss=parseFloat(metrics?.cvssData?.baseScore||5.0);
      const vector=parseVector(metrics?.cvssData?.vectorString||"");
      const cpes=(cve.configurations||[]).flatMap(cfg=>(cfg.nodes||[]).flatMap(n=>(n.cpeMatch||[]).map(m=>m.criteria)));
      const affects=cpeToplatform(cpes.join(" "));
      const isKev=kevSet.has(id);
      return{id,cvss,desc:desc.slice(0,120),type,src:isKev?"NVD+KEV":"NVD",kev:isKev,
             epss:0.5,affects,industries:["all"],cwe,vector,exploit:exploitStatus(isKev,0.5),
             publishedDate:cve.published};
    }).filter(v=>v.cvss>=5.0);
    
    const ids=mapped.map(v=>v.id).join(",");
    const epssRes=await fetch("https://api.first.org/data/v1/epss?cve="+ids);
    const epssData=await epssRes.json();
    const epssMap={};
    (epssData.data||[]).forEach(e=>{epssMap[e.cve]=parseFloat(e.epss);});
    const enriched=mapped.map(v=>({...v,
      epss:epssMap[v.id]!==undefined?epssMap[v.id]:(v.kev?0.85:0.3),
      exploit:exploitStatus(v.kev,epssMap[v.id]||(v.kev?0.85:0.3))
    }));
    
    const liveIds=new Set(enriched.map(v=>v.id));
    const staticFallbacks=VULNS.filter(v=>!liveIds.has(v.id)&&v.kev);
    const final=[...enriched,...staticFallbacks];
    onProgress("Live data ready — "+final.length+" CVEs loaded");
    return final;
  }catch(err){
    console.warn("Live fetch failed:",err.message);
    onProgress("Live feeds unavailable — using static dataset");
    return [];
  }
}

    if(s>=20) return '#8b0000';
    if(s>=13) return '#b84a00';
    if(s>=6)  return '#5a4a00';
    return '#1a3a1a';
  };
  const cellCounts = {};
  top10.forEach(v=>{
    const impact=Math.min(5,Math.ceil(v.cvss/2));
    const likelihood=Math.min(5,Math.ceil(v.epss*5+(v.kev?2:0)));
    const key=Math.min(5,likelihood)+'-'+impact;
    cellCounts[key]=(cellCounts[key]||0)+1;
  });

  const critControls = CONTROLS.filter(ctrl=>{
    const cat=RISK_CATS.find(r=>r.id===ctrl.riskCat);
    return cat&&ind?.riskFocus?.includes(ctrl.riskCat);
  }).slice(0,5);

  const gaugeD = (pct) => {
    const rr=54, gx=70, gy=70;
    const start=-Math.PI*0.75;
    const end=start+(Math.PI*1.5*pct);
    const x1=gx+rr*Math.cos(start), y1=gy+rr*Math.sin(start);
    const x2=gx+rr*Math.cos(end),   y2=gy+rr*Math.sin(end);
    const large=pct>0.5?1:0;
    return 'M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+rr+','+rr+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1);
  };

  const downloadCSV = () => {
    const rows=["CVE ID,Description,CVSS,Context Score,KEV",
      ...top10.map(v=>v.id+',"'+v.desc+'",'+v.cvss+','+v.contextScore+','+v.kev)
    ].join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([rows],{type:'text/csv'}));
    a.download='RiskSync_Scorecard.csv';a.click();
  };

  return (
    <div style={{padding:'20px', overflow:'auto', height:'100%'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <div style={{fontSize:20,fontWeight:900,color:'#fff',letterSpacing:.3}}>Executive Risk Scorecard</div>
          <div style={{fontSize:10,color:C.muted,marginTop:3}}>{ind?.label} · {sc?.label} · USA - {geo?.label} · Data-Heavy (PII / IP)</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={downloadCSV} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:4,border:`1px solid ${C.border}`,background:C.card,color:C.muted,fontSize:11,cursor:'pointer'}}>
            <i className="ti ti-download" style={{fontSize:11}}/>PDF
          </button>
          <button onClick={downloadCSV} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:4,border:`1px solid ${C.green}50`,background:C.greenBg,color:C.green,fontSize:11,fontWeight:700,cursor:'pointer'}}>
            <i className="ti ti-table" style={{fontSize:11}}/>Excel
          </button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
        {/* Gauge */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'16px'}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.8,marginBottom:12}}>GLOBAL RISK PULSE</div>
          <div style={{display:'flex',alignItems:'center',gap:20}}>
            <svg viewBox="0 0 140 90" width="160" style={{display:'block',flexShrink:0}}>
              <path d={gaugeD(1)} fill="none" stroke="#1a2540" strokeWidth="14" strokeLinecap="round"/>
              <path d={gaugeD(pulse/100)} fill="none" stroke={scorecol} strokeWidth="14" strokeLinecap="round"/>
              <text x="70" y="62" textAnchor="middle" fontSize="26" fontWeight="900" fill={scorecol}>{pulse}</text>
              <text x="70" y="76" textAnchor="middle" fontSize="9" fill={C.muted}>{gScore>=7?'ELEVATED':'MANAGED'}</text>
            </svg>
            <div style={{fontSize:10,color:C.muted,lineHeight:1.7}}>Score represents weighted severity across {top10.length} threats adjusted for your profile.</div>
          </div>
        </div>
        {/* Industry benchmark */}
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'16px'}}>
          <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:.8,marginBottom:12}}>INDUSTRY BENCHMARK</div>
          {[
            {label:'Your Score ('+ind?.label+')', val:pulse, color:scorecol},
            {label:'Sector Average', val:62, color:C.muted},
          ].map(b=>(
            <div key={b.label} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:10,color:C.muted}}>{b.label}</span>
                <span style={{fontSize:11,fontWeight:700,color:b.color}}>{b.val}</span>
              </div>
              <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden'}}>
                <div style={{width:b.val+'%',height:'100%',background:b.color,borderRadius:3}}/>
              </div>
            </div>
          ))}
          <div style={{marginTop:10,padding:'8px 10px',background:C.green+'15',borderRadius:5,border:`1px solid ${C.green}30`}}>
            <div style={{fontSize:10,color:C.green}}>~-7 pts vs Finance sector average</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>Your risk posture is better than the sector average. Maintain current controls.</div>
          </div>
        </div>
      </div>

      {/* Heat map */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'16px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'#fff',textTransform:'uppercase',letterSpacing:.8}}>RISK HEAT MAP - LIKELIHOOD x IMPACT</div>
          <div style={{fontSize:10,color:C.muted}}>Hover cells to inspect threats.</div>
        </div>
        <div style={{display:'flex',gap:10,marginBottom:10}}>
          {[['#1a3a1a','Low'],['#5a4a00','Med'],['#b84a00','High'],['#8b0000','Critical']].map(([bg,lb])=>(
            <div key={lb} style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:C.muted}}>
              <div style={{width:10,height:10,background:bg}}/>{lb}
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'16px repeat(5,1fr)',gap:2,maxWidth:500}}>
          {[5,4,3,2,1].map(likelihood=>(
            <React.Fragment key={likelihood}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:4,fontSize:8,color:C.muted}}>{likelihood}</div>
              {[1,2,3,4,5].map(impact=>{
                const key=likelihood+'-'+impact;
                const count=cellCounts[key]||0;
                const isH=hovCell===key;
                return (
                  <div key={impact} onMouseEnter={()=>setHovCell(key)} onMouseLeave={()=>setHovCell(null)}
                    style={{aspectRatio:'1',background:heatColor(likelihood,impact),border:isH?'1px solid #fff':'1px solid rgba(255,255,255,0.05)',borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center',cursor:'default',transition:'border .1s'}}>
                    {count>0&&<span style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.8)'}}>{count}</span>}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
          <div/>{[1,2,3,4,5].map(i=><div key={i} style={{textAlign:'center',fontSize:8,color:C.muted,paddingTop:3}}>{i}</div>)}
        </div>
        <div style={{fontSize:8,color:C.muted,marginTop:4,marginLeft:20}}>IMPACT →</div>
      </div>

      {/* Critical Controls */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:'16px',marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:'#fff',textTransform:'uppercase',letterSpacing:.8,marginBottom:4}}>CRITICAL CONTROLS - WHAT-IF ANALYSIS</div>
        <div style={{fontSize:10,color:C.muted,marginBottom:14}}>Toggle controls to see real-time impact on your final score.</div>
        {critControls.length>0 ? critControls.map((ctrl,i)=>{
          const isOn=controls.includes(ctrl.id);
          return (
            <div key={ctrl.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:i<critControls.length-1?`1px solid ${C.border}`:'none'}}>
              <button onClick={()=>setControls(prev=>isOn?prev.filter(x=>x!==ctrl.id):[...prev,ctrl.id])}
                style={{width:36,height:20,borderRadius:10,background:isOn?C.green:C.border,border:'none',cursor:'pointer',position:'relative',flexShrink:0,transition:'background .2s'}}>
                <div style={{width:14,height:14,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:isOn?19:3,transition:'left .2s'}}/>
              </button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2,flexWrap:'wrap'}}>
                  <span style={{fontSize:11,fontWeight:600,color:isOn?'#fff':C.muted}}>{ctrl.name}</span>
                  <span style={{fontSize:9,color:C.muted}}>{ctrl.type}</span>
                  {ind&&<span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:2,background:(ind.color||C.accent)+'20',color:ind.color||C.accent}}>Priority for {ind.label}</span>}
                </div>
                <div style={{fontSize:10,color:C.dim}}>{ctrl.desc||'Select remaining controls.'}</div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:13,fontWeight:700,color:C.green}}>{ctrl.reduction}%</div>
                <div style={{fontSize:9,color:C.muted}}>mitigation</div>
              </div>
            </div>
          );
        }) : <div style={{padding:'20px',textAlign:'center',color:C.muted,fontSize:11}}>Configure your profile to see recommended controls.</div>}
      </div>

      {/* Intelligence brief */}
      <div style={{background:'#0a1520',border:`1px solid ${C.accent}40`,borderRadius:8,padding:'14px 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
          <i className="ti ti-alert-triangle" style={{fontSize:12,color:C.amber}}/>
          <span style={{fontSize:10,fontWeight:700,color:C.amber,textTransform:'uppercase',letterSpacing:.7}}>RISKSYNC INTELLIGENCE - {(ind?.label||'').toUpperCase()} PROFILE</span>
        </div>
        <div style={{fontSize:11,color:C.muted,lineHeight:1.75,marginBottom:10}}>
          {ind?.label} faces elevated risk from AI-driven deepfake fraud and BEC campaigns in 2026. Your {sc?.label} classification yields a x{ind?.multiplier} multiplier. {top10.filter(v=>v.contextScore>=8).length} Critical-priority threats in your feed. {CONTROLS[0]?.name||'Out-of-Band Transfer Auth'} is your highest-ROI control.
        </div>
        <button style={{fontSize:10,color:C.accent,background:'transparent',border:'none',cursor:'pointer',padding:0}}>View Full Risk Analysis →</button>
      </div>
    </div>
  );
}

      const ind      = INDUSTRIES.find(i => i.id === profile.industry);

              {k.badge

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>

/* ── SCORECARD PAGE ── */

function App() {
  const [onboarded, setOnboarded] = useState(false);
  const [profile,   setProfile]   = useState(null);
  const [controls,  setControls]  = useState([]);
  const [nav,       setNav]       = useState("dashboard");
  const [activeCategory, setActiveCategory] = useState("all");

  const [liveVulns,  setLiveVulns]  = useState([]);
  const [dataStatus, setDataStatus] = useState({ state:"idle", msg:"", count:0, lastUpdated:null });

  useEffect(() => {
    setDataStatus({ state:"loading", msg:"Initialising...", count:0, lastUpdated:null });
    fetchLiveVulns(msg => setDataStatus(s => ({...s, msg})))
      .then(vulns => {
        if (vulns.length > 0) {
          setLiveVulns(vulns);
          setDataStatus({ state:"live", msg:`${vulns.length} CVEs loaded`, count:vulns.length, lastUpdated:new Date() });
        } else {
          setDataStatus({ state:"fallback", msg:`Using ${VULNS.length} curated CVEs`, count:VULNS.length, lastUpdated:null });
        }
      });
  }, []);

  useEffect(() => {
    const t = setInterval(() => {
      fetchLiveVulns(msg => setDataStatus(s => ({...s, state:"loading", msg})))
        .then(vulns => {
          if (vulns.length > 0) {
            setLiveVulns(vulns);
            setDataStatus({ state:"live", msg:`${vulns.length} CVEs`, count:vulns.length, lastUpdated:new Date() });
          }
        });
    }, 60*60*1000);
    return () => clearInterval(t);
  }, []);

  const handleComplete = useCallback(p => { setProfile(p); setOnboarded(true); }, []);
  const handleResync   = () => { setOnboarded(false); setProfile(null); setControls([]); setNav("dashboard"); };

  if (!onboarded) return <Onboarding onComplete={handleComplete}/>;

  const gScore = globalRisk(profile, controls);

  /* Shared props */
  const pageProps = { profile, liveVulns, controls, setControls, activeCategory, setActiveCategory };

  /* Page title map */
  const titles = {
    dashboard: "OP-CENTER / OVERVIEW",
    threats:   "THREAT FEED",
    analysis:  "RISK ANALYSIS",
    funnel:    "THREAT FUNNEL",
    why10:     "WHY THESE 10",
    pipeline:  "FILTER PIPELINE",
    industry:  "INDUSTRY MULTIPLIERS",
    sources:   "SOURCE TRUST",
    simulator: "WHAT-IF SIMULATOR",
    scorecard: "RISK SCORECARD",
  };

  return (
    <div style={{ display:"flex", height:"100vh", background:C.bg, overflow:"hidden", fontFamily:"'IBM Plex Mono','Fira Code',monospace" }}>

      {/* LEFT SIDEBAR */}
      <Sidebar profile={profile} nav={nav} setNav={setNav} dataStatus={dataStatus} gScore={gScore}/>

      {/* MAIN CONTENT */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>

        {/* OP-CENTER HEADER */}
        <OpcHeader
          title={titles[nav] || "OP-CENTER"}
          profile={profile}
          dataStatus={dataStatus}
          onResync={handleResync}
          activeCategory={activeCategory}
          setActiveCategory={setActiveCategory}
        />

        {/* PAGE CONTENT */}
        <div style={{ flex:1, overflow:"hidden" }}>
          {nav==="dashboard" && <DashboardPage  {...pageProps} activeCategory={activeCategory}/>}
          {nav==="threats"   && <ThreatFeedPage profile={profile} liveVulns={liveVulns}/>}
          {nav==="analysis"  && <RiskAnalysisPage {...pageProps}/>}
          {nav==="funnel"    && <div style={{height:"100%",overflow:"auto",padding:20}}><VulnFunnel    profile={profile} liveVulns={liveVulns}/></div>}
          {nav==="why10"     && <div style={{height:"100%",overflow:"auto",padding:20}}><WhyThese10    profile={profile} liveVulns={liveVulns}/></div>}
          {nav==="pipeline"  && <div style={{height:"100%",overflow:"auto",padding:20}}><FilterFunnel  profile={profile} liveVulns={liveVulns}/></div>}
          {nav==="industry"  && <IndustryPage   profile={profile}/>}
          {nav==="sources"   && <SourceTrustPage profile={profile}/>}
          {nav==="simulator" && <div style={{height:"100%",overflow:"auto",padding:20}}><Simulator     profile={profile} controls={controls} setControls={setControls}/></div>}
          {nav==="scorecard" && <ScorecardPage  {...pageProps}/>}
          {nav==="bulletin"  && <BulletinPage   profile={profile} liveVulns={liveVulns} controls={controls}/>}
        </div>
      </div>
    </div>
  );
}

function computeVulnScore(v,profile){
  const ind=INDUSTRIES.find(i=>i.id===profile.industry);
  const sc=SCALES.find(s=>s.id===profile.scale);
  const geo=GEOS.find(g=>g.id===profile.geo)||GEOS.find(g=>g.id==="other");
  if(!ind||!sc)return v.cvss;
  const indM=ind.multiplier;
  const scaleM=sc.s_multiplier;
  const geoM=geo.regMultiplier;
  const platMatch=(profile.techPillars||[]).some(pid=>{
    const pillar=TECH_PILLARS.find(t=>t.id===pid);
    return v.affects.includes(pid)||(pillar&&v.affects.some(a=>a===pid));
  });
  const platM=platMatch?1.18:0.55;
  const indMatch=v.industries.includes("all")||v.industries.includes(profile.industry);
  const indRelevance=indMatch?1.0:0.5;
  const prof=IND_PROFILE_VULN[profile.industry]||{boost:[],suppress:[]};
  const typeBoost=prof.boost.includes(v.type)?1.28:prof.suppress.includes(v.type)?0.38:1.0;
  const kevBonus=v.kev?1.1:1.0;
  const raw=v.cvss*indM*scaleM*geoM*platM*indRelevance*typeBoost*kevBonus;
  return parseFloat(Math.min(10,raw).toFixed(1));
}

function getTop10Vulns(profile, vulnList){
  const list = vulnList && vulnList.length > 0 ? vulnList : VULNS;
  return list
    .map(v=>({...v,contextScore:computeVulnScore(v,profile)}))
    .sort((a,b)=>b.contextScore-a.contextScore)
    .slice(0,10);
}

/* ── SCORING ENGINE ── */
const sevOf=n=>n>=8?"CRITICAL":n>=6?"HIGH":n>=4?"MEDIUM":"LOW";
const sevColor=n=>n>=8?C.red:n>=6?C.amber:n>=4?C.accent:C.green;
const sevBg=n=>n>=8?C.redBg:n>=6?C.amberBg:n>=4?C.accentBg:C.greenBg;

function computeRisk(profile,controls_enabled,cat){
  if(!profile.industry||!profile.scale)return null;
  const ind=INDUSTRIES.find(i=>i.id===profile.industry);
  const sc=SCALES.find(s=>s.id===profile.scale);
  const geo=GEOS.find(g=>g.id===profile.geo)||GEOS.find(g=>g.id==="other");
  if(!ind||!sc)return null;
  const catRelevant=ind.riskFocus.includes(cat.id);
  const industryM=catRelevant?ind.multiplier:ind.multiplier*.6;
  const scaleM=sc.s_multiplier;
  const regM=geo.regMultiplier;
  const tagDelta=(profile.subTags||[]).reduce((a,tid)=>{const tag=SUB_TAGS.find(t=>t.id===tid);return tag&&tag.category===cat.id?a+tag.delta:a;},0);
  const activeSrcs=SOURCES.filter(s=>profile.sources?.includes(s.id));
  const sourceConf=activeSrcs.length>0?activeSrcs.reduce((a,s)=>a+s.trust,0)/activeSrcs.length:.7;
  const pillarMatch=(profile.techPillars||[]).some(pid=>{const p=TECH_PILLARS.find(t=>t.id===pid);return p?.threatTags.includes(cat.id);});
  const pillarM=pillarMatch?1.1:.85;
  const B=cat.baseScore;
  const inherent=Math.min(10,B*industryM*scaleM*regM*pillarM+tagDelta);
  const trendFactor=1+(cat.trend*.05);
  const catControls=CONTROLS.filter(ctrl=>controls_enabled.includes(ctrl.id)&&ctrl.riskCat===cat.id);
  const ctrlEff=catControls.length>0?Math.min(.95,catControls.reduce((a,c)=>a+c.mitigation,0)*.7):0;
  const residual=Math.max(.5,inherent*(1-ctrlEff)*trendFactor*sourceConf);
  return{
    inherent:parseFloat(Math.min(10,inherent).toFixed(1)),
    residual:parseFloat(Math.min(10,residual).toFixed(1)),
    ctrlEff:parseFloat((ctrlEff*100).toFixed(0)),
    sourceConf:parseFloat((sourceConf*100).toFixed(0)),
    catRelevant,pillarMatch,
  };
}

function globalRisk(profile,controls){
  const scores=RISK_CATS.map(cat=>computeRisk(profile,controls,cat));
  const valid=scores.filter(Boolean);
  return valid.length>0?parseFloat((valid.reduce((a,s)=>a+s.residual,0)/valid.length).toFixed(1)):0;
}
